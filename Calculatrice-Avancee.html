<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Avancée</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .calculatrice{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            border: 2px solid rgb(177, 177, 177);
            width: 50%;
            height: auto;
        }
        .display-area{
            background-color: rgb(230, 230, 230);
            height: 60px;
            margin: 10px;
            border-radius: 4px;
            border: 2px solid rgb(186, 186, 186);;
        }
        .divider{
            border: none;
            height: 2px;
            background: rgb(177, 177, 177);
        }
        .divider2{
            border: none;
            height: 1px;
            background: rgb(177, 177, 177);
        }
        .calculator-option-firstRow{
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            gap: 15px;
        }
        .calculator-option-firstRow button{
            width: 93.5px;
            height: 40px;
        }
        .calculator-option{
            display: flex;
            padding: 10px;
            gap: 15px;
        }
        .calculator-option button{
            width: 100%;
            height: 40px;
        }
        .option-action{
            background-color: rgb(188, 188, 188);
            border: 0;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Outfit';
            font-size: 16px;
            color: black;
        }
        .option-action-number{
            background-color: white;
            border: 0;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Outfit';
            font-size: 16px;
            transition: 0.15s;
        }
        .option-action-number:hover{
            background-color: rgb(188, 188, 188);
        }
    </style>
</head>
<body>
    <div class="calculatrice">
        <div class="container">
            <div class="display-area">
                <p></p>
            </div>
            <hr class="divider">
            <div class="calculator-option-firstRow">
                <button class="option-action">(</button>
                <button class="option-action">)</button>
                <button class="option-action">%</button>
                <button class="option-action">CE</button>
            </div>
            <hr class="divider2">
            <div class="calculator-option">
                <button class="option-action">Inv</button>
                <button class="option-action">Sin</button>
                <button class="option-action">In</button>
                <button class="option-action-number">7</button>
                <button class="option-action-number">8</button>
                <button class="option-action-number">9</button>
                <button class="option-action">÷</button>
            </div>
            <hr class="divider2">
            <div class="calculator-option">
                <button class="option-action">π</button>
                <button class="option-action">Cos</button>
                <button class="option-action">Log</button>
                <button class="option-action-number">4</button>
                <button class="option-action-number">5</button>
                <button class="option-action-number">6</button>
                <button class="option-action">x</button>
            </div>
            <hr class="divider2">
            <div class="calculator-option">
                <button class="option-action">e</button>
                <button class="option-action">Tan</button>
                <button class="option-action">√</button>
                <button class="option-action-number">3</button>
                <button class="option-action-number">2</button>
                <button class="option-action-number">1</button>
                <button class="option-action">-</button>
            </div>
            <hr class="divider2">
            <div class="calculator-option">
                <button class="option-action">EXP</button>
                <button class="option-action">x²</button>
                <button class="option-action">x^</button>
                <button class="option-action">.</button>
                <button class="option-action-number">0</button>
                <button class="option-action">=</button>
                <button class="option-action">+</button>
            </div>
        </div>
    </div>
</body>
</html>
